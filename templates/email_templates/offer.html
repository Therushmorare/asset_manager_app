{% extends "base_email.html" %}

{% block header %}
<div class="header" style="background:#20c997;">Job Offer</div>
{% endblock %}

{% block content %}
<p>Dear {{ first_name }} {{ last_name }},</p>

<div class="box">
  {{ message }}
</div>
<p>Please review and respond by the specified deadline.</p>
{% endblock %}
